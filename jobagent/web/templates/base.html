<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}jobagent{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f2ee;
      --panel: #ffffff;
      --ink: #1c1b22;
      --muted: #6b6975;
      --line: #e4e0d8;
      --accent: #4f46e5;
      --accent-soft: #ecebfc;
      --good: #1f8a4c;
      --good-soft: #e3f3ea;
      --warn: #b4690e;
      --warn-soft: #fbeede;
      --bad: #b3261e;
      --bad-soft: #fbe7e6;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.topbar {
      background: var(--ink);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 28px;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
    .brand .dot { color: #a5a0ff; }
    nav.tabs { display: flex; gap: 4px; flex: 1; }
    nav.tabs a {
      color: #c8c6d2;
      padding: 8px 14px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
    }
    nav.tabs a:hover { color: #fff; text-decoration: none; background: rgba(255,255,255,.08); }
    nav.tabs a.on { color: #fff; background: rgba(255,255,255,.16); }
    .guard {
      font-size: 12px; color: #b7f3cf; background: rgba(31,138,76,.25);
      padding: 4px 10px; border-radius: 999px; white-space: nowrap;
    }
    main { max-width: 1040px; margin: 0 auto; padding: 28px 24px 64px; }
    h1 { font-size: 26px; letter-spacing: -0.02em; margin: 0 0 4px; }
    h2 { font-size: 16px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 28px 0 12px; }
    .sub { color: var(--muted); margin: 0 0 20px; }
    .flash {
      background: var(--accent-soft); color: #312e81; border: 1px solid #c7c4f5;
      padding: 12px 16px; border-radius: var(--radius); margin-bottom: 20px; font-size: 14px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 18px;
    }
    .stat .n { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
    .stat .l { color: var(--muted); font-size: 13px; }
    .stat.hl { background: var(--accent); color: #fff; border-color: var(--accent); }
    .stat.hl .l { color: #d9d7ff; }
    table { width: 100%; border-collapse: collapse; background: var(--panel);
      border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    th, td { text-align: left; padding: 11px 14px; font-size: 14px; border-bottom: 1px solid var(--line); }
    th { background: #faf9f6; color: var(--muted); font-weight: 600; font-size: 12px;
      text-transform: uppercase; letter-spacing: .05em; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf9f6; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .b-grey { background: #efede8; color: #595862; }
    .b-accent { background: var(--accent-soft); color: #312e81; }
    .b-good { background: var(--good-soft); color: var(--good); }
    .b-warn { background: var(--warn-soft); color: var(--warn); }
    .b-bad { background: var(--bad-soft); color: var(--bad); }
    .btn {
      display: inline-block; background: var(--accent); color: #fff; border: none;
      padding: 9px 16px; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn:hover { background: #4338ca; text-decoration: none; }
    .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
    .btn.ghost:hover { background: #faf9f6; }
    .btn.good { background: var(--good); }
    .btn.good:hover { background: #176c3b; }
    .btn.sm { padding: 5px 11px; font-size: 13px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .spread { justify-content: space-between; }
    form.inline { display: inline; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
    .field input, .field textarea {
      width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px;
      font-size: 14px; font-family: inherit; background: #fff;
    }
    .field input:focus, .field textarea:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
    .kv { font-size: 14px; }
    .kv .k { color: var(--muted); }
    pre.cover {
      background: #faf9f6; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 16px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px; line-height: 1.6; color: #2c2b33;
    }
    .note { color: var(--muted); font-size: 13px; }
    .muted { color: var(--muted); }
    .empty { text-align: center; color: var(--muted); padding: 40px; background: var(--panel);
      border: 1px dashed var(--line); border-radius: var(--radius); }
    .item {
      background: var(--panel); border: 1px solid var(--line); border-radius: 11px;
      padding: 12px 14px; margin-bottom: 10px;
    }
    .item.required { border-left: 4px solid var(--warn); }
    .item.optional { border-left: 4px solid var(--line); }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="brand">job<span class="dot">·</span>agent</span>
    <nav class="tabs">
      <a href="/" class="{{ 'on' if active=='dashboard' }}">Dashboard</a>
      <a href="/jobs" class="{{ 'on' if active=='jobs' }}">Jobs</a>
      <a href="/review" class="{{ 'on' if active=='review' }}">Review queue</a>
      <a href="/tracker" class="{{ 'on' if active=='tracker' }}">Tracker</a>
      <a href="/materials" class="{{ 'on' if active=='materials' }}">Materials</a>
      <a href="/companies" class="{{ 'on' if active=='companies' }}">Companies</a>
      <a href="/profile" class="{{ 'on' if active=='profile' }}">Profile</a>
      <a href="/guide" class="{{ 'on' if active=='guide' }}">Guide</a>
      <a href="/foreman/">Foreman</a>
    </nav>
    <span class="guard">🔒 the agent never submits</span>
  </header>
  <main>
    {% if msg %}<div class="flash">{{ msg }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
