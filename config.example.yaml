# jobagent configuration. Copy to `config.yaml` and edit.
# `config.yaml` is gitignored. Secrets do NOT go here — they go in `.env`.

log_level: INFO

paths:
  # Defaults to ./data — uncomment to relocate the agent's state.
  # data_dir: /Users/you/.jobagent

scoring:
  # auto  = use Claude if ANTHROPIC_API_KEY is set, else the heuristic scorer
  # heuristic = always use the offline deterministic scorer
  # claude = require Claude (errors if no key)
  backend: auto
  model: claude-sonnet-4-6
  shortlist_threshold: 0.6   # score >= threshold -> shortlisted, else skipped
  max_jobs_per_run: 200

sourcing:
  user_agent: "jobagent/0.1 (+personal job-application assistant)"
  request_timeout: 20
  min_interval_seconds: 1.5  # politeness: minimum gap between hits to one host
  max_retries: 3
  cache_ttl_seconds: 3600    # re-use cached board responses for this long
  respect_robots: true       # never fetch a path robots.txt disallows
  max_jobs_per_company: 0    # 0 = no cap

followup:
  days_until_followup: 7     # draft a follow-up this many days after submit

# The watchlist — a finite, human-defined set of company ATS boards (guardrail §2).
# Prefer `board_token` (the ATS slug). For greenhouse the token is the board
# name in https://boards.greenhouse.io/<token>; for lever it is the company
# slug in https://jobs.lever.co/<token>.
companies:
  - name: Example (Greenhouse)
    ats_type: greenhouse
    board_token: example          # -> boards-api.greenhouse.io/v1/boards/example
    notes: Replace with a real target company.
    active: false

  - name: Example (Lever)
    ats_type: lever
    board_token: example          # -> api.lever.co/v0/postings/example
    notes: Replace with a real target company.
    active: false

  - name: Example (Workable, HTML)
    ats_type: workable
    board_token: example          # -> apply.workable.com/example
    notes: HTML-parsed fallback; prefer JSON ATSs where possible.
    active: false
